<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        
        header {width: 100%; height: 150px; background-color: gold;}
        #top {width: 1100px; height: 100%; margin: 0 auto; background-color: pink;}

        #content {width: 1100px; height: 1300px; margin: 0 auto; background-color: cyan;}
        .left {width: 60%; height: 1300px; float: left; background-color: skyblue; }

        .box {width: 600px; height: 300px; background-color: darkgrey; margin: 10px;}
        .right {width: 40%; height: 800px; float: right; position: sticky; top: 0; background-color: slateblue;}

        #detail {width: 1100px; height: 500px; margin: 0 auto; background-color: plum;}

    </style>
</head>
<body>
    <header>
        <div id="top"></div>
    </header>

    <div id="content">
        <div class="left">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="right"></div>        
    </div>

    <div id="detail"></div>
    
</body>
</html>
